<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #222; color: #eee; max-width: 418px; min-width: 418px; margin: auto; padding: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 400px; padding: 8px; margin-bottom: 20px; border: 1px solid #444; border-radius: 4px; background-color: #111; color: #eee; }
        input:invalid { background-color: #970000 !important; }
        #cookies { margin-left: 9px; margin-right: 9px; }
        .domain-list { margin-top: 20px; border-top: 1px solid #444; padding-top: 15px; }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        li span { flex-grow: 1; margin-right: 10px; }
        button { color: #fff; cursor: pointer; border: none; padding: 5px 8px; border-radius: 2px; }
        li button { font-size: 0.8em; }
        #addCurrentDomainButton,#removeCurrentDomainButton { width: 418px; }
        .tab-control-button { width: 150px; }
        .lr-container { display: flex; justify-content: space-between; }
        li button,.red { background-color: #a22; }
        li button,.red:hover { background-color: #972222; }
        .green { background-color: #393;}
        .green:hover { background-color: #338833; }
    </style>
</head>
<body>
    <label for="playerUrl">YT-DLP Player URL:</label>
    <input type="url" id="playerUrl" pattern="https://.*" placeholder="https://example.com" title="YT-DLP player URL with HTTPS endpoint">
    <label for="cookies">Send cookies with requests:</label>
    <input type="checkbox" id="cookies" title="If enabled, every replaced video will be played with your browser's cookies">
    
    <div class="lr-container">
        <button id="startCurrentTabButton" class="tab-control-button green">Start For Current Tab</button>
        <button id="stopCurrentTabButton" class="tab-control-button red">Stop For Current Tab</button>
    </div>

    <div id="domainListContainer" class="domain-list">
        <button id="addCurrentDomainButton" class="green">Add Current Domain</button>
        <button id="removeCurrentDomainButton" class="red" style="display: none;">Remove Current Domain</button>
        <ul id="allowedDomainsList">
        </ul>
        <input type="text" id="allowedDomains" placeholder="Click on Add Current Domain">
    </div>

    <script src="options.js"></script>
</body>
</html>
