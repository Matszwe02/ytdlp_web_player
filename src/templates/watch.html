<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, viewport-fit=cover, initial-scale=1.0" />
        <meta name="color-scheme" content="dark light">
        <title>{{ app_title }}</title>
        <meta name="theme-color" content="{{ theme_color }}">
        <style>
            .vjs-theme-custom {
                --vjs-theme-custom--primary: {{ theme_color }};
            }
        </style>
        <link rel="stylesheet" href="{{ url_for('static', filename='fontawesome/css/all.min.css') }}" />
        <link rel="stylesheet" href="{{ url_for('static', filename='video-js.css') }}" type="text/css" />
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" type="text/css" />
        <link rel="stylesheet" href="{{ url_for('static', filename='videojs.css') }}" type="text/css" />
        
        <link rel="icon" type="image/png" href="/thumb?url={{original_url|urlencode}}">
        <link rel="shortcut icon" href="/thumb?url={{original_url|urlencode}}">
        <link rel="icon" href="/thumb?url={{original_url|urlencode}}">
        <meta property="og:site_name" content="{{app_title}}">
        <meta property="og:url" content="/watch?url={{original_url|urlencode}}">
        <meta property="og:title" content="{{video_title}}">
        <meta property="og:image" content="/thumb?url={{original_url|urlencode}}">
        <meta property="og:description" content="{{app_title}}">
        <meta property="al:web:url" content="/watch?url={{original_url|urlencode}}">
        <meta property="og:type" content="video.other">
        <meta property="og:video:url" content="/download?url={{original_url|urlencode}}">
        <meta property="og:video:secure_url" content="/download?url={{original_url|urlencode}}">
        <meta property="og:video" content="/download?url={{original_url|urlencode}}">
        <meta property="og:video:type" content="video.other">
        <meta property="og:video:width" content="{{ video_width }}">
        <meta property="og:video:height" content="{{ video_height }}">
        <meta name="description" content="{{video_title}}">
        <meta name="twitter:card" content="player">
        <meta name="twitter:url" content="/watch?url={{original_url|urlencode}}">
        <meta name="twitter:title" content="{{video_title}}">
        <meta name="twitter:description" content="{{app_title}}">
        <meta name="twitter:image" content="/thumb?url={{original_url|urlencode}}">
        <meta name="twitter:player" content="/download?url={{original_url|urlencode}}">
        <meta name="twitter:player:stream" content="/download?url={{original_url|urlencode}}">
        <meta name="twitter:player:stream:content_type" content="video/mp4">
        <meta name="twitter:player:width" content="{{ video_width }}">
        <meta name="twitter:player:height" content="{{ video_height }}">
    </head>
    <body>
    
        <div style="position: fixed; top: 10px; left: 10px">
            <a href="/" style="text-decoration: none">
                <button id="home-button"><i class="fa-solid fa-house"></i> Home</button>
            </a>
        </div>
        
        <div class="container" id="video">
            <video id="videoPlayer" class="video-js vjs-default-skin vjs-big-play-centered vjs-theme-custom" controls preload="auto" width="100%" height="100%">
                <p class="vjs-no-js">
                    To view this video please enable JavaScript, and consider upgrading to a
                    web browser that <a href="https://videojs.com/html5-video-support/" target="_blank">supports HTML5 video</a>
                </p>
            </video>
        </div>
        
        <div id="expandable-menu-container">
            <button id="expand-button" class="expand-button" aria-label="Menu">
                <i class="fa-solid fa-chevron-up"></i>
            </button>
            <div id="expandable-content" class="expandable-content">
                <ul>
                    <li><a href="/watch?url={{original_url|urlencode}}" onclick="copyCurrentUrl(event)" id="url-copy"><i class="fa-solid fa-copy"></i> Copy URL</a></li>
                    <li><a href="{{original_url}}" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i> Open Video</a></li>
                    <li><a href="javascript:void(0)" onclick="toggleAmoled()"><i class="fa-solid fa-circle-half-stroke"></i>Toggle AMOLED</a></li>
                    <li>
                        <a href="https://github.com/Matszwe02/ytdlp_web_player" target="_blank">
                            <span title="{{app_version}}"><i class="fa-solid fa-circle-info"></i> Version:<br><b>{{app_version}}</b><br></span>
                            <span title="{{ydl_version}}">YT-DLP: <b>{{ydl_version}}</b><br></span>
                            <span title="{{js_runtime_version[4:]}}">{{js_runtime_version[:4]}}: <b>{{js_runtime_version[4:]}}</b><br></span>
                            <span title="{{ffmpeg_version}}">FFmpeg: <b>{{ffmpeg_version}}</b><br></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- VideoJS Script -->
        <script src="{{ url_for('static', filename='video.min.js') }}"></script>
        
        <!-- https://github.com/ctd1500/videojs-hotkeys -->
        <script src="{{ url_for('static', filename='videojs.hotkeys.min.js') }}"></script>
        
        <!-- https://github.com/humbertorodrigues/videojs-doubletap -->
        <script src="{{ url_for('static', filename='videojs.doubletapff.js') }}"></script>
        
        <!-- https://www.npmjs.com/package/videojs-sprite-thumbnails -->
        <script src="{{ url_for('static', filename='videojs-sprite-thumbnails.min.js') }}"></script>
        
        <script src="{{ url_for('static', filename='audio-visualizer.js') }}"></script>
        
        <script src="{{ url_for('static', filename='script.js') }}"></script>
        
        <script>
            const expandButton = document.getElementById('expand-button');
            const expandableContent = document.getElementById('expandable-content');
            let isExpanded = false;
            expandButton.addEventListener('click', function(event) {
                event.stopPropagation();
                isExpanded = !isExpanded;
                if (isExpanded)
                {
                    expandableContent.style.maxHeight = expandableContent.scrollHeight + "px";
                    expandButton.classList.add('expanded');
                }
                else
                {
                    expandableContent.style.maxHeight = "0";
                    expandButton.classList.remove('expanded');
                }
            });
            document.addEventListener('click', function(event) {
                const expandableMenuContainer = document.getElementById('expandable-menu-container');
                if (isExpanded && !expandableMenuContainer.contains(event.target))
                {
                    expandButton.click();
                }
            });
            function copyCurrentUrl(event)
            {
                if (event.button === 0)
                {
                    event.preventDefault();
                    navigator.clipboard.writeText(window.top.location.href.split('?')[0] + '?url={{original_url|urlencode}}').then(() => {
                        var b = document.getElementById('url-copy');
                        b.innerHTML = '<i class="fa-solid fa-copy"></i> URL Copied!';
                        setTimeout(() => { b.innerHTML = '<i class="fa-solid fa-copy"></i> Copy URL'; }, 2000);
                    });
                }
            }
            function toggleAmoled(state = null)
            {
                var newState = document.documentElement.style.getPropertyValue('--theme-bg') != '#000';
                if (state != null) newState = state;
                if (newState)
                {
                    document.documentElement.style.setProperty('--theme-bg', '#000');
                    document.documentElement.style.setProperty('--theme-fg', '#555');
                    document.documentElement.style.setProperty('--theme-bg-light', '#000');
                }
                else
                {
                    document.documentElement.style.setProperty('--theme-bg', '#1a1a1a');
                    document.documentElement.style.setProperty('--theme-fg', '#999');
                    document.documentElement.style.setProperty('--theme-bg-light', '#272727');
                }
            }
            toggleAmoled({{'true' if amoled_bg else 'false'}});
        </script>
    </body>
</html>
