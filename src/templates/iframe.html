<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, viewport-fit=cover, initial-scale=1.0" />
        <meta name="color-scheme" content="dark light">
        <title>{{ app_title }}</title>
        <meta name="theme-color" content="{{ theme_color }}">
        <meta property="og:site_name" content="{{app_title}}">
        <style>
            .vjs-theme-custom {
                --vjs-theme-custom--primary: {{ theme_color }};
            }
            .video-js
            {
                border-radius: 0px !important;
                border: none !important;
                width: 100vw !important;
                height: 100vh !important;
                min-width: 100vw !important;
                min-height: 100vh !important;
                transition-duration: 0s !important;
            }
        </style>

        <link rel="stylesheet" href="{{ url_for('static', filename='fontawesome/css/all.min.css') }}" />
        <link rel="stylesheet" href="{{ url_for('static', filename='video-js.css') }}" type="text/css" />
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" type="text/css" />
        <link rel="stylesheet" href="{{ url_for('static', filename='videojs.css') }}" type="text/css" />
    </head>
    <body>
        
        <div class="container" id="video">
            <video id="videoPlayer" class="video-js vjs-default-skin vjs-big-play-centered vjs-theme-custom" controls preload="auto" width="100%" height="100%">
                <p class="vjs-no-js">
                    To view this video please enable JavaScript, and consider upgrading to a
                    web browser that <a href="https://videojs.com/html5-video-support/" target="_blank">supports HTML5 video</a>
                </p>
            </video>
        </div>

        <!-- VideoJS Script -->
        <script src="{{ url_for('static', filename='video.min.js') }}"></script>
        
        <!-- https://github.com/ctd1500/videojs-hotkeys -->
        <script src="{{ url_for('static', filename='videojs.hotkeys.min.js') }}"></script>
        
        <!-- https://github.com/humbertorodrigues/videojs-doubletap -->
        <script src="{{ url_for('static', filename='videojs.doubletapff.js') }}"></script>
        
        <!-- https://www.npmjs.com/package/videojs-sprite-thumbnails -->
        <script src="{{ url_for('static', filename='videojs-sprite-thumbnails.min.js') }}"></script>
        
        <script src="{{ url_for('static', filename='audio-visualizer.js') }}"></script>
        
        <script src="{{ url_for('static', filename='script.js') }}"></script>
    </body>
</html>
