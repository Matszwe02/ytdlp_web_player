name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ghcr.io/matszwe02/ytdlp_web_player:${{ github.event.release.tag_name }} \
            -t ghcr.io/matszwe02/ytdlp_web_player:stable \
            -t matszwe02/ytdlp_web_player:${{ github.event.release.tag_name }} \
            -t matszwe02/ytdlp_web_player:stable \
            --push .
